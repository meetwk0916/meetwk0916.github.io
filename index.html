<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="format-detection" content="telephone=no">
    <meta name="format-detection" content="email=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="renderer" content="webkit">

    <!-- SEO & Social -->
    <title>Walter & Selina ❤️</title>
    <meta name="description" content="Walter & Selina's love timer. Together since June 15, 2015.">
    <meta name="theme-color" content="#764ba2">
    <meta name="keywords" content="Walter, Selina, love, timer, anniversary">
    <link rel="canonical" href="https://meetwk0916.github.io/">

    <!-- Open Graph -->
    <meta property="og:title" content="Walter & Selina ❤️">
    <meta property="og:description" content="Walter & Selina's love timer. Together since June 15, 2015.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://meetwk0916.github.io/">
    <meta property="og:image" content="https://meetwk0916.github.io/assets/img/logo.png">
    <meta property="og:site_name" content="Walter & Selina">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Walter & Selina ❤️">
    <meta name="twitter:description" content="Walter & Selina's love timer. Together since June 15, 2015.">
    <meta name="twitter:image" content="https://meetwk0916.github.io/assets/img/logo.png">

    <!-- Favicons -->
    <link rel="shortcut icon" href="/favicon.ico">
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="apple-touch-icon" href="/assets/img/favicons/apple-icon-precomposed.png">

    <!-- Styles -->
    <link rel="stylesheet" href="assets/css/love-timer.css">
</head>
<body>
    <div class="bg-animation"></div>
    <canvas id="confettiCanvas" class="confetti-canvas"></canvas>
    <div class="container">
        <div class="profile">
            <img src="assets/img/logo.png" alt="Walter & Selina" class="avatar">
            <h1 class="names">Walter <span role="img" aria-label="love">❤️</span> Selina</h1>
            <p class="subtitle">Since 2015</p>
        </div>

        <div class="anniversary-banner" id="anniversaryBanner"></div>

        <div class="timer-card">
            <div class="milestone-info" id="milestoneInfo"></div>

            <div class="meet-date">
                <p class="meet-label">We've been together since</p>
                <p class="meet-value">June 15, 2015</p>
            </div>

            <div class="timer-grid">
                <div class="timer-item days">
                    <span class="timer-value" id="days">--</span>
                    <span class="timer-label">Days</span>
                </div>
                <div class="timer-item">
                    <span class="timer-value" id="hours">--</span>
                    <span class="timer-label">Hours</span>
                </div>
                <div class="timer-item">
                    <span class="timer-value" id="minutes">--</span>
                    <span class="timer-label">Minutes</span>
                </div>
                <div class="timer-item" style="grid-column: span 2;">
                    <span class="timer-value" id="seconds">--</span>
                    <span class="timer-label">Seconds</span>
                </div>
            </div>
        </div>

        <div class="quote" id="loveQuote" role="button" tabindex="0" aria-describedby="quoteHint" aria-live="polite">
            <div class="quote-text">Loading...</div>
            <div class="quote-author"></div>
            <div class="quote-hint" id="quoteHint">
                <span class="mouse-hint">Click for another quote</span>
                <span class="keyboard-hint">Press Enter for another quote</span>
            </div>
        </div>
    </div>

    <script src="assets/js/love-timer.js"></script>
</body>
</html>
