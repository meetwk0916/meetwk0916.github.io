<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="format-detection" content="telephone=no,email=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="renderer" content="webkit">
    <meta name="theme-color" content="#ffffff">

    <!-- SEO & Social -->
    <title>Walter &amp; Selina ❤️</title>
    <meta name="description" content="Walter & Selina's love timer. Together since June 15, 2015.">
    <meta name="keywords" content="Walter, Selina, love, timer, anniversary">
    <link rel="canonical" href="https://meetwk0916.github.io/">

    <!-- Open Graph -->
    <meta property="og:title" content="Walter & Selina ❤️">
    <meta property="og:description" content="Walter & Selina's love timer. Together since June 15, 2015.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://meetwk0916.github.io/">
    <meta property="og:image" content="https://meetwk0916.github.io/assets/img/logo.png">
    <meta property="og:site_name" content="Walter & Selina">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Walter & Selina ❤️">
    <meta name="twitter:description" content="Walter & Selina's love timer. Together since June 15, 2015.">
    <meta name="twitter:image" content="https://meetwk0916.github.io/assets/img/logo.png">

    <!-- Favicons -->
    <link rel="shortcut icon" href="/favicon.ico">
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="apple-touch-icon" href="/assets/img/favicons/apple-icon-precomposed.png">

    <style>
        /* =========================================================
           Apple Design Tokens — Walter ❤️ Selina Love Timer
           Inspired by Apple's DESIGN.md
           ========================================================= */

        /* --- Apple Color Tokens --- */
        :root {
            --canvas: #ffffff;
            --canvas-parchment: #f5f5f7;
            --ink: #1d1d1f;
            --ink-muted-80: #333333;
            --ink-muted-48: #7a7a7a;
            --primary: #0066cc;
            --primary-focus: #0071e3;
            --primary-on-dark: #2997ff;
            --hairline: #e0e0e0;
            --divider-soft: #f0f0f0;

            /* Typography tokens */
            --font-display: "SF Pro Display", "SF Pro Text", system-ui, -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
            --font-body: "SF Pro Text", "SF Pro Display", system-ui, -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;

            /* Rounded tokens */
            --radius-sm: 8px;
            --radius-md: 14px;
            --radius-lg: 18px;
            --radius-xl: 24px;
            --radius-pill: 9999px;

            /* Spacing tokens */
            --space-xs: 5px;
            --space-sm: 12px;
            --space-md: 22px;
            --space-lg: 30px;
            --space-xl: 48px;
            --space-2xl: 64px;
            --space-3xl: 80px;
            --space-section: 100px;
        }

        /* --- Reset --- */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }

        body {
            font-family: var(--font-body);
            font-size: 17px;
            font-weight: 400;
            line-height: 1.47;
            letter-spacing: -0.374px;
            color: var(--ink);
            background: linear-gradient(180deg, var(--canvas) 0%, var(--canvas-parchment) 100%);
            background-attachment: fixed;
            overflow-x: hidden;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Subtle Apple-style ambient background pattern */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 20%, rgba(0, 102, 204, 0.015) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 80%, rgba(0, 102, 204, 0.01) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
            animation: ambientDrift 60s ease-in-out infinite alternate;
        }

        @keyframes ambientDrift {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(-2%, -1%) rotate(3deg); }
        }

        /* --- Confetti Canvas (fixed overlay) --- */
        #confettiCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        /* --- Main Container --- */
        main {
            width: 100%;
            max-width: 680px;
            padding: var(--space-3xl) var(--space-lg) var(--space-2xl);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* =========================================================
           Profile Section
           ========================================================= */

        .profile-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding-bottom: var(--space-xl);
        }

        .avatar {
            width: 132px;
            height: 132px;
            border-radius: 50%;
            border: 3px solid var(--canvas);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
            margin-bottom: var(--space-lg);
            display: block;
            /* product photo — single shadow allowed */
        }

        .hero-name {
            font-family: var(--font-display);
            font-size: 48px;
            font-weight: 600;
            line-height: 1.07;
            letter-spacing: -0.28px;
            color: var(--ink);
            margin-bottom: var(--space-sm);
        }

        .hero-name .heart-emoji {
            display: inline-block;
            font-size: 0.8em;
            vertical-align: middle;
            color: #ff3b30;
        }

        .since-date {
            font-family: var(--font-body);
            font-size: 14px;
            font-weight: 400;
            line-height: 1.43;
            letter-spacing: -0.224px;
            color: var(--ink-muted-48);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* =========================================================
           Anniversary Banner
           ========================================================= */

        .anniversary-banner {
            display: none;
            width: 100%;
            text-align: center;
            padding: var(--space-lg) var(--space-md);
            margin-bottom: var(--space-md);
            background: var(--canvas-parchment);
            border-radius: var(--radius-xl);
            animation: fadeScaleIn 0.8s ease both;
        }

        .anniversary-banner.is-visible {
            display: block;
        }

        .anniversary-title {
            font-family: var(--font-display);
            font-size: 28px;
            font-weight: 600;
            line-height: 1.14;
            letter-spacing: 0.196px;
            color: var(--primary);
            margin-bottom: var(--space-xs);
        }

        .anniversary-subtitle {
            font-family: var(--font-body);
            font-size: 14px;
            font-weight: 400;
            line-height: 1.43;
            letter-spacing: -0.224px;
            color: var(--ink-muted-48);
        }

        @keyframes fadeScaleIn {
            from {
                opacity: 0;
                transform: scale(0.96);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* =========================================================
           Timer Card — Frosted Glass
           ========================================================= */

        .timer-card {
            width: 100%;
            background: rgba(245, 245, 247, 0.72);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-radius: var(--radius-xl);
            padding: var(--space-xl) var(--space-lg);
            margin-bottom: var(--space-2xl);
            /* No shadow — UI chrome does not cast shadows in Apple design */
        }

        .milestone-info {
            display: none;
            text-align: center;
            margin-bottom: var(--space-md);
            padding: var(--space-sm) var(--space-md);
            background: var(--divider-soft);
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 400;
            line-height: 1.43;
            letter-spacing: -0.224px;
            color: var(--ink-muted-80);
        }

        .milestone-info.is-visible {
            display: block;
        }

        .milestone-value {
            color: var(--primary);
            font-weight: 600;
        }

        /* --- Timer Grid --- */
        .timer-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-sm);
        }

        .timer-item {
            background: rgba(255, 255, 255, 0.55);
            border-radius: var(--radius-sm);
            padding: var(--space-md) var(--space-sm);
            text-align: center;
            /* No shadow — Apple rule */
        }

        .timer-item.days {
            grid-column: 1 / -1;
            background: rgba(255, 255, 255, 0.7);
        }

        .timer-value {
            font-family: var(--font-display);
            font-size: 40px;
            font-weight: 600;
            line-height: 1.1;
            letter-spacing: 0;
            font-variant-numeric: tabular-nums;
            display: block;
            color: var(--ink);
            margin-bottom: var(--space-xs);
        }

        .timer-item.days .timer-value {
            font-size: 52px;
        }

        .timer-label {
            font-family: var(--font-body);
            font-size: 12px;
            font-weight: 400;
            line-height: 1.0;
            letter-spacing: -0.12px;
            color: var(--ink-muted-48);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Anniversary glow (very subtle, on border only) */
        .timer-card.is-anniversary {
            border: 1.5px solid var(--primary);
        }

        /* =========================================================
           Quote Section
           ========================================================= */

        .quote-section {
            width: 100%;
            text-align: center;
            cursor: pointer;
            padding: var(--space-lg) var(--space-md);
            margin-bottom: var(--space-xl);
            border-radius: var(--radius-lg);
            transition: background 0.2s ease;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            outline: none;
        }

        .quote-section:hover,
        .quote-section:focus-visible {
            background: var(--canvas-parchment);
        }

        .quote-section:focus-visible {
            outline: 2px solid var(--primary-focus);
            outline-offset: 2px;
        }

        .quote-mark {
            font-family: "Georgia", "Times New Roman", serif;
            font-size: 48px;
            font-weight: 400;
            line-height: 0.8;
            color: var(--ink-muted-48);
            opacity: 0.3;
            margin-bottom: var(--space-sm);
            user-select: none;
        }

        .quote-text {
            font-family: "Georgia", "Times New Roman", serif;
            font-size: 22px;
            font-weight: 400;
            line-height: 1.5;
            letter-spacing: 0;
            color: var(--ink);
            transition: opacity 0.3s ease;
            max-width: 580px;
            margin: 0 auto;
        }

        .quote-author {
            font-family: var(--font-body);
            font-size: 14px;
            font-weight: 400;
            line-height: 1.43;
            letter-spacing: -0.224px;
            color: var(--ink-muted-48);
            margin-top: var(--space-md);
            transition: opacity 0.3s ease;
        }

        .quote-hint {
            font-family: var(--font-body);
            font-size: 12px;
            font-weight: 400;
            line-height: 1.0;
            letter-spacing: -0.12px;
            color: var(--primary);
            margin-top: var(--space-md);
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .quote-section:hover .quote-hint,
        .quote-section:focus-visible .quote-hint {
            opacity: 0.7;
        }

        /* =========================================================
           Footer
           ========================================================= */

        .page-footer {
            width: 100%;
            max-width: 680px;
            padding: var(--space-xl) var(--space-lg);
            text-align: center;
            border-top: 1px solid var(--divider-soft);
            margin-top: auto;
        }

        .footer-text {
            font-family: var(--font-body);
            font-size: 12px;
            font-weight: 400;
            line-height: 1.43;
            letter-spacing: -0.224px;
            color: var(--ink-muted-48);
        }

        .footer-heart {
            color: #ff3b30;
        }

        /* =========================================================
           Responsive
           ========================================================= */

        @media (max-width: 734px) {
            main {
                padding: var(--space-2xl) var(--space-md) var(--space-xl);
            }

            .hero-name {
                font-size: 36px;
                letter-spacing: -0.2px;
            }

            .avatar {
                width: 108px;
                height: 108px;
                margin-bottom: var(--space-md);
            }

            .timer-card {
                padding: var(--space-lg) var(--space-md);
            }

            .timer-value {
                font-size: 32px;
            }

            .timer-item.days .timer-value {
                font-size: 40px;
            }

            .timer-grid {
                gap: var(--space-xs);
            }

            .timer-item {
                padding: var(--space-sm) var(--space-xs);
            }

            .quote-text {
                font-size: 19px;
            }
        }

        @media (max-width: 480px) {
            .hero-name {
                font-size: 28px;
                letter-spacing: -0.15px;
            }

            .avatar {
                width: 88px;
                height: 88px;
            }

            .timer-value {
                font-size: 26px;
            }

            .timer-item.days .timer-value {
                font-size: 34px;
            }

            .timer-label {
                font-size: 10px;
            }

            .quote-text {
                font-size: 17px;
            }

            .anniversary-title {
                font-size: 22px;
            }
        }

        @media (min-width: 1068px) {
            .hero-name {
                font-size: 56px;
            }

            .timer-value {
                font-size: 48px;
            }

            .timer-item.days .timer-value {
                font-size: 60px;
            }

            .quote-text {
                font-size: 24px;
            }
        }

        /* =========================================================
           Utility Animations
           ========================================================= */

        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-in {
            animation: slideUp 0.6s ease both;
        }

        .animate-in-delay-1 { animation-delay: 0.1s; }
        .animate-in-delay-2 { animation-delay: 0.2s; }
        .animate-in-delay-3 { animation-delay: 0.3s; }
    </style>
</head>
<body>

    <!-- Confetti Canvas -->
    <canvas id="confettiCanvas" aria-hidden="true"></canvas>

    <!-- Main Content -->
    <main>
        <!-- Profile -->
        <section class="profile-section animate-in animate-in-delay-1">
            <img src="assets/img/logo.png" alt="Walter & Selina" class="avatar" width="132" height="132">
            <h1 class="hero-name">Walter <span class="heart-emoji" role="img" aria-label="love">❤️</span> Selina</h1>
            <p class="since-date">Since June 15, 2015</p>
        </section>

        <!-- Anniversary Banner -->
        <div id="anniversaryBanner" class="anniversary-banner" aria-live="polite"></div>

        <!-- Timer Card (Frosted Glass) -->
        <div class="timer-card animate-in animate-in-delay-2" id="timerCard">
            <div id="milestoneInfo" class="milestone-info"></div>

            <div class="timer-grid">
                <div class="timer-item days">
                    <span class="timer-value" id="days" aria-label="days">--</span>
                    <span class="timer-label">Days</span>
                </div>
                <div class="timer-item">
                    <span class="timer-value" id="hours" aria-label="hours">--</span>
                    <span class="timer-label">Hours</span>
                </div>
                <div class="timer-item">
                    <span class="timer-value" id="minutes" aria-label="minutes">--</span>
                    <span class="timer-label">Minutes</span>
                </div>
                <div class="timer-item">
                    <span class="timer-value" id="seconds" aria-label="seconds">--</span>
                    <span class="timer-label">Seconds</span>
                </div>
            </div>
        </div>

        <!-- Quote Section -->
        <div class="quote-section animate-in animate-in-delay-3"
             id="loveQuote"
             role="button"
             tabindex="0"
             aria-label="Click to see another love quote">
            <div class="quote-mark" aria-hidden="true">"</div>
            <div class="quote-text" id="quoteText">Loading...</div>
            <div class="quote-author" id="quoteAuthor"></div>
            <div class="quote-hint">Click for another quote</div>
        </div>

        <!-- Footer -->
        <footer class="page-footer">
            <p class="footer-text">Made with <span class="footer-heart">❤️</span> &middot; Walter &amp; Selina</p>
        </footer>
    </main>

    <script>
        /* =========================================================
           Walter ❤️ Selina Love Timer — Apple Style
           All functionality preserved: timer, quotes, confetti, anniversaries
           ========================================================= */

        (function () {
            'use strict';

            // ─── Configuration ───────────────────────────────────────
            const MEET_DATE = new Date(2015, 5, 15, 0, 0, 0);
            const MS_DAY  = 86400000;
            const MS_HOUR = 3600000;
            const MS_MIN  = 60000;
            const MS_SEC  = 1000;

            // ─── Love Quotes ─────────────────────────────────────────
            const loveQuotes = [
                { text: "Love is composed of a single soul inhabiting two bodies.", author: "Aristotle" },
                { text: "The best thing to hold onto in life is each other.", author: "Audrey Hepburn" },
                { text: "I have found the one whom my soul loves.", author: "Song of Solomon" },
                { text: "In all the world, there is no heart for me like yours.", author: "Maya Angelou" },
                { text: "To love and be loved is to feel the sun from both sides.", author: "David Viscott" },
                { text: "You don't love someone for their looks, or their clothes, or for their fancy car, but because they sing a song only you can hear.", author: "Oscar Wilde" },
                { text: "If I know what love is, it is because of you.", author: "Hermann Hesse" },
                { text: "I would rather spend one lifetime with you, than face all the ages of this world alone.", author: "J.R.R. Tolkien" },
                { text: "You are my sun, my moon, and all my stars.", author: "E.E. Cummings" },
                { text: "Being deeply loved by someone gives you strength, while loving someone deeply gives you courage.", author: "Lao Tzu" },
                { text: "Love isn't something you find. Love is something that finds you.", author: "Loretta Young" },
                { text: "The greatest thing you'll ever learn is just to love and be loved in return.", author: "Eden Ahbez" },
                { text: "I saw that you were perfect, and so I loved you. Then I saw that you were not perfect and I loved you even more.", author: "Angelita Lim" },
                { text: "You are the finest, loveliest, tenderest, and most beautiful person I have ever known—and even that is an understatement.", author: "F. Scott Fitzgerald" },
                { text: "For the two of us, home isn't a place. It is a person. And we are finally home.", author: "Stephanie Perkins" },
                { text: "I've tried so many times to think of a new way to say it, and it's still I love you.", author: "Zelda Fitzgerald" },
                { text: "I swear I couldn't love you more than I do right now, and yet I know I will tomorrow.", author: "Leo Christopher" },
                { text: "If you live to be a hundred, I want to live to be a hundred minus one day so I never have to live without you.", author: "A.A. Milne" },
                { text: "To the world you may be one person, but to one person you are the world.", author: "Bill Wilson" },
                { text: "Love is not about how many days, months, or years you have been together. Love is about how much you love each other every single day.", author: "Unknown" }
            ];

            // ─── DOM Cache ───────────────────────────────────────────
            const $ = (sel, ctx) => (ctx || document).querySelector(sel);

            const els = {
                days:      $('#days'),
                hours:     $('#hours'),
                minutes:   $('#minutes'),
                seconds:   $('#seconds'),
                quote:     $('#loveQuote'),
                quoteText: $('#quoteText'),
                quoteAuthor: $('#quoteAuthor'),
                banner:    $('#anniversaryBanner'),
                milestone: $('#milestoneInfo'),
                timerCard: $('#timerCard'),
                canvas:    $('#confettiCanvas')
            };

            let lastQuoteIdx = -1;

            // ─── Timer ───────────────────────────────────────────────
            function updateTimer() {
                var now = Date.now();
                var diff = now - MEET_DATE.getTime();

                var days    = Math.floor(diff / MS_DAY);
                var hours   = Math.floor((diff % MS_DAY) / MS_HOUR);
                var minutes = Math.floor((diff % MS_HOUR) / MS_MIN);
                var seconds = Math.floor((diff % MS_MIN) / MS_SEC);

                if (els.days)    els.days.textContent    = days.toLocaleString();
                if (els.hours)   els.hours.textContent   = String(hours).padStart(2, '0');
                if (els.minutes) els.minutes.textContent = String(minutes).padStart(2, '0');
                if (els.seconds) els.seconds.textContent = String(seconds).padStart(2, '0');
            }

            // ─── Quotes ──────────────────────────────────────────────
            function showQuote() {
                if (!els.quoteText || !els.quoteAuthor) return;

                var idx;
                if (loveQuotes.length > 1) {
                    do { idx = Math.floor(Math.random() * loveQuotes.length); }
                    while (idx === lastQuoteIdx);
                } else {
                    idx = 0;
                }
                lastQuoteIdx = idx;
                var q = loveQuotes[idx];

                // Crossfade
                els.quoteText.style.opacity = '0';
                els.quoteAuthor.style.opacity = '0';

                setTimeout(function () {
                    els.quoteText.textContent = '\u201c' + q.text + '\u201d';
                    els.quoteAuthor.textContent = '\u2014 ' + q.author;
                    els.quoteText.style.opacity = '1';
                    els.quoteAuthor.style.opacity = '1';
                }, 250);
            }

            // ─── Anniversary ─────────────────────────────────────────
            function getOrdinal(n) {
                var s = ['th', 'st', 'nd', 'rd'];
                var v = n % 100;
                return n + (s[(v - 20) % 10] || s[v] || s[0]);
            }

            function getAnniversaryInfo() {
                var now = new Date();
                var y = now.getFullYear();
                var m = now.getMonth();
                var d = now.getDate();

                var my = MEET_DATE.getFullYear();
                var mm = MEET_DATE.getMonth();
                var md = MEET_DATE.getDate();

                var years = y - my;
                var isAnniv = (m === mm && d === md);

                var next = new Date(y, mm, md);
                if (next < now) next = new Date(y + 1, mm, md);
                var daysUntil = Math.ceil((next - now) / MS_DAY);

                return { isAnniversary: isAnniv, years: years, nextDate: next, daysUntil: daysUntil };
            }

            function initMilestones() {
                var info = getAnniversaryInfo();
                var banner = els.banner;
                var milestone = els.milestone;
                var card = els.timerCard;

                if (info.isAnniversary && info.years > 0) {
                    // Show banner
                    var ord = getOrdinal(info.years);
                    banner.innerHTML =
                        '<div class="anniversary-title">Happy ' + ord + ' Anniversary!</div>' +
                        '<div class="anniversary-subtitle">' + info.years + ' years of love and counting</div>';
                    banner.classList.add('is-visible');

                    // Card glow
                    if (card) card.classList.add('is-anniversary');

                    // Launch confetti
                    if (els.canvas) {
                        startConfetti(els.canvas, 10000);
                    }
                } else {
                    // Show milestone countdown
                    var nextOrd = getOrdinal(info.years + 1);
                    var dateStr = info.nextDate.toLocaleDateString('en-US', {
                        month: 'long', day: 'numeric', year: 'numeric'
                    });
                    milestone.innerHTML =
                        '<span class="milestone-label">Next milestone:</span> ' +
                        '<span class="milestone-value">' + nextOrd + ' Anniversary on ' + dateStr +
                        ' \u2014 ' + info.daysUntil + ' days to go</span>';
                    milestone.classList.add('is-visible');
                }
            }

            // ─── Confetti Particle System ────────────────────────────
            function startConfetti(canvas, duration) {
                var ctx = canvas.getContext('2d');
                var W, H;
                var particles = [];
                var running = true;
                var endTime = Date.now() + duration;

                function resize() {
                    W = canvas.width  = window.innerWidth;
                    H = canvas.height = window.innerHeight;
                }
                resize();
                window.addEventListener('resize', resize);

                var colors = ['#0066cc', '#0071e3', '#2997ff', '#ffffff', '#ff3b30', '#ff9500'];

                function createParticle() {
                    var isHeart = Math.random() < 0.25;
                    return {
                        x: Math.random() * W,
                        y: -15,
                        size: Math.random() * 7 + 3,
                        speedY: Math.random() * 3 + 1.5,
                        speedX: Math.random() * 2 - 1,
                        rot: Math.random() * 360,
                        rotSpeed: Math.random() * 6 - 3,
                        color: colors[Math.floor(Math.random() * colors.length)],
                        opacity: 1,
                        isHeart: isHeart
                    };
                }

                function drawHeart(c, x, y, s) {
                    c.beginPath();
                    var t = s * 0.3;
                    c.moveTo(x, y + t);
                    c.bezierCurveTo(x, y, x - s/2, y, x - s/2, y + t);
                    c.bezierCurveTo(x - s/2, y + (s+t)/2, x, y + s*0.8, x, y + s);
                    c.bezierCurveTo(x, y + s*0.8, x + s/2, y + (s+t)/2, x + s/2, y + t);
                    c.bezierCurveTo(x + s/2, y, x, y, x, y + t);
                    c.closePath();
                    c.fill();
                }

                function animate() {
                    if (!running && particles.length === 0) {
                        ctx.clearRect(0, 0, W, H);
                        return;
                    }
                    ctx.clearRect(0, 0, W, H);
                    for (var i = particles.length - 1; i >= 0; i--) {
                        var p = particles[i];
                        p.y += p.speedY;
                        p.x += p.speedX;
                        p.rot += p.rotSpeed;
                        p.opacity -= 0.003;

                        ctx.save();
                        ctx.globalAlpha = Math.max(0, p.opacity);
                        ctx.translate(p.x, p.y);
                        ctx.rotate(p.rot * Math.PI / 180);
                        ctx.fillStyle = p.color;
                        if (p.isHeart) {
                            drawHeart(ctx, 0, 0, p.size);
                        } else {
                            ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size * 0.6);
                        }
                        ctx.restore();

                        if (p.opacity <= 0 || p.y > H + 20) {
                            particles.splice(i, 1);
                        }
                    }
                    requestAnimationFrame(animate);
                }

                // Spawn particles
                var spawnTimer = setInterval(function () {
                    if (Date.now() >= endTime) {
                        clearInterval(spawnTimer);
                        return;
                    }
                    for (var i = 0; i < 3; i++) {
                        particles.push(createParticle());
                    }
                }, 80);

                animate();
                setTimeout(function () { running = false; }, duration + 2000);
            }

            // ─── Keyboard ────────────────────────────────────────────
            function handleQuoteKey(e) {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    showQuote();
                }
            }

            // ─── Init ────────────────────────────────────────────────
            function init() {
                updateTimer();
                setInterval(updateTimer, 1000);
                showQuote();
                initMilestones();

                if (els.quote) {
                    els.quote.addEventListener('click', showQuote);
                    els.quote.addEventListener('keydown', handleQuoteKey);
                }
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>
